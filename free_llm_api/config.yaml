# free_llm_api configuration — FREE provider tiers only.
#
# API keys, models, and weights all support ${ENV_VAR} expansion with
# optional defaults (${VAR:-default}). Every provider follows the pattern:
#   model:  "${NAME_UPPER_MODEL:-built-in-default}"
#   weight: "${NAME_UPPER_WEIGHT:-built-in-default}"
# Export the matching variables to override per-provider settings at
# runtime without editing this file.
# Example: GROQ_MODEL=llama-4 GROQ_WEIGHT=20 python3 tests/example.py
#
# Providers whose key is empty are skipped automatically;
# set `enabled: false` to remove one explicitly.
#
# Nearly every provider is OpenAI-compatible, so they all share `type: openai`
# and differ only by `extra.base_url`. To add another, copy a block and change
# the URL + model — no Python needed.
#
# `name`         : label for this entry (shown in logs / stats)
# `type`         : registered implementation (`openai` or `huggingface`)
# `weight`       : relative share of traffic under weighted_round_robin
# `requires_key` : set false for key-less gateways (e.g. LLM7.io)

providers:
  - name: groq
    type: openai
    enabled: true
    api_key: "${GROQ_API_KEY}"
    model: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
    weight: "${GROQ_WEIGHT:-10}"
    extra:
      base_url: "https://api.groq.com/openai/v1"

  - name: openrouter
    type: openai
    enabled: true
    api_key: "${OPENROUTER_API_KEY}"
    model: "${OPENROUTER_MODEL:-qwen/qwen3-coder}"   # keep the :free suffix
    weight: "${OPENROUTER_WEIGHT:-6}"
    extra:
      base_url: "https://openrouter.ai/api/v1"
      headers:                                        # OpenRouter attribution
        HTTP-Referer: "https://github.com/your/repo"
        X-Title: "free_llm_api"

  - name: nvidia
    type: openai
    enabled: true
    api_key: "${NVIDIA_API_KEY}"
    model: "${NVIDIA_MODEL:-meta/llama-3.1-8b-instruct}"
    weight: "${NVIDIA_WEIGHT:-10}"
    extra:
      base_url: "https://integrate.api.nvidia.com/v1"

  - name: mistral
    type: openai
    enabled: true
    api_key: "${MISTRAL_API_KEY}"
    model: "${MISTRAL_MODEL:-mistral-small-latest}"
    weight: "${MISTRAL_WEIGHT:-6}"
    extra:
      base_url: "https://api.mistral.ai/v1"

  - name: zai            # Z.AI / Zhipu — GLM models
    type: openai
    enabled: true
    api_key: "${ZAI_API_KEY}"
    model: "${ZAI_MODEL:-glm-4.5-flash}"          # free tier (glm-4.6 etc. need a paid balance)
    weight: "${ZAI_WEIGHT:-5}"
    extra:
      base_url: "https://api.z.ai/api/paas/v4"
      params:
        thinking:
          type: disabled            # GLM defaults to deep-thinking -> empty `content`; disable it

  - name: cerebras
    type: openai
    enabled: true
    api_key: "${CEREBRAS_API_KEY}"
    model: "${CEREBRAS_MODEL:-gpt-oss-120b}"
    weight: "${CEREBRAS_WEIGHT:-7}"
    extra:
      base_url: "https://api.cerebras.ai/v1"

  - name: llm7           # free; token optional but raises rate limits
    type: openai
    enabled: true
    requires_key: false             # works key-less; token used only if present
    api_key: "${LLM7_API_KEY}"      # export LLM7_API_KEY to raise limits
    model: "${LLM7_MODEL:-qwen3-235b}"             # free tier (gpt-5.4-mini etc. are pay-per-token)
    weight: "${LLM7_WEIGHT:-4}"
    extra:
      base_url: "https://api.llm7.io/v1"

  - name: gemini         # Google AI Studio, OpenAI-compatible endpoint
    type: openai
    enabled: true
    api_key: "${GEMINI_API_KEY}"
    model: "${GEMINI_MODEL:-gemini-2.5-flash}"
    weight: "${GEMINI_WEIGHT:-8}"
    extra:
      base_url: "https://generativelanguage.googleapis.com/v1beta/openai"

settings:
  strategy: "weighted_round_robin"   # or "fastest" (lowest mean latency)
  retry_on_failure: true             # fail over to the next provider on error
  timeout: 120                       # per-request seconds (coding needs longer; overridable per provider)
